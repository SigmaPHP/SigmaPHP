name: Run on Linux

on:
  push:
    branches:
      - master

jobs:
  test-run:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php-version: ["8.0", "8.1", "8.2", "8.3", "8.4"]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, pdo, pdo_mysql
          coverage: none

      - name: Copy and update .env
        run: |
          cp .env.example .env

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Start PHP built-in server
        run: |
          ./bin/sigma-cli run &
          sleep 5

      - name: Check app response
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" http://localhost:8888)
          TITLE=$(curl -s http://localhost:8888 | grep -o "<title>.*</title>")

          if [ "$STATUS" != "200" ]; then
            echo "Invalid status code: $STATUS"
            exit 1
          fi

          if [[ "$TITLE" != *"SigmaPHP - Framework"* ]]; then
            echo "Title not found: $TITLE"
            exit 1
          fi

          echo "App is running correctly with status 200 and correct title."
